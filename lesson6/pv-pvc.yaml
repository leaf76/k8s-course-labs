# 6-12 PV + PVC 實作（靜態佈建）
# 功能：讓 MySQL 的資料在 Pod 重啟後不消失
#
# Docker 對照：
#   docker volume create mydata
#   docker run -v mydata:/var/lib/mysql mysql
#   ↓ K8s 等價 ↓
#   PV = docker volume create（管理員建立儲存空間）
#   PVC = -v mydata:/path（使用者申請使用儲存空間）
#
# 流程：
#   1. 管理員建立 PV（「我有 2Gi 的儲存空間」）
#   2. 使用者建立 PVC（「我需要 1Gi 的儲存空間」）
#   3. K8s 自動配對（Binding）
#   4. MySQL Pod 掛載 PVC，資料寫進 PV，Pod 重建後資料還在

---
# --- Step 1: PersistentVolume（管理員建立）---

apiVersion: v1
kind: PersistentVolume
metadata:
  name: local-pv
spec:
  capacity:
    storage: 2Gi                        # PV 提供 2Gi（PVC 只申請 1Gi，故意不同，方便講解）
  accessModes:
    - ReadWriteOnce                     # RWO：同時只能被一個 Node 掛載
  persistentVolumeReclaimPolicy: Retain # PVC 刪掉後，PV 的資料保留
  storageClassName: manual              # 自訂名稱，PVC 要用一樣的才能配對
  hostPath:
    path: /tmp/k8s-pv-data              # 學習用：直接用 Node 本機路徑
    type: DirectoryOrCreate             # 目錄不存在就自動建立
  nodeAffinity:                         # 多 Node 環境：固定到 master，避免 hostPath 跨 Node
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - ubuntu-master

---
# --- Step 2: PersistentVolumeClaim（使用者申請）---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: local-pvc
spec:
  accessModes:
    - ReadWriteOnce                     # 要跟 PV 的 accessModes 一致
  resources:
    requests:
      storage: 1Gi                      # 申請 1Gi（PV 有 2Gi，夠用）
  storageClassName: manual              # 要跟 PV 的 storageClassName 一樣

---
# --- Step 3: MySQL Deployment 掛載 PVC ---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "rootpassword123"
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql     # 把 PVC 掛到 MySQL 的資料目錄
      volumes:
      - name: mysql-storage
        persistentVolumeClaim:
          claimName: local-pvc          # 指定要用哪個 PVC
