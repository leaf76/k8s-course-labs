# ============================================
# Lab 1：你被叫去救火
# 情境：你是新入職的工程師，同事部署了 API 服務
#        但設定有問題，READY 一直不正常。
#        這份 YAML 有兩個 bug，自己找。
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: api
          image: nginx:1.25
