# Lab 6-5: Secret（管理敏感資訊）
# 功能：用 Secret 存放密碼，注入到 Pod，curl 直接驗證有沒有套進去
#
# Docker 對照：
#   docker run -e PASSWORD=mypassword yanchen184/k8s-demo-app
#   ↓ K8s 等價 ↓
#   用 Secret 存密碼，再注入到 Pod
#
# ⚠ 重要觀念：Secret 的 Base64 編碼「不是加密」！
#   echo -n "mypassword" | base64  → bXlwYXNzd29yZA==
#   任何人拿到都能解碼，Secret 只是「不讓你一眼看到明文」
#
# 驗證（curl 直接看到 Secret 的值）：
#   curl http://<NODE-IP>/frontend
#   → Server: 10.42.x.x:80
#   → Message: Hello from ConfigMap
#   → Username: admin               ← 來自 ConfigMap
#   → Password: mypassword          ← 來自 Secret

---
# 方法 1：stringData（推薦，直接寫明文，K8s 自動 Base64）
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
stringData:
  PASSWORD: "mypassword"

# 方法 2：data（手動 Base64）
# apiVersion: v1
# kind: Secret
# metadata:
#   name: app-secret
# type: Opaque
# data:
#   PASSWORD: bXlwYXNzd29yZA==   # echo -n "mypassword" | base64

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deploy
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: app
          image: yanchen184/k8s-demo-app:latest
          envFrom:
            - configMapRef:
                name: app-config    # ConfigMap：MESSAGE, USERNAME
            - secretRef:
                name: app-secret    # Secret：PASSWORD
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
