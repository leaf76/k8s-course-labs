# Step 4 用：只有 Ingress 規則，不含 Deployment/Service
# 前提：已 apply secret-db.yaml（frontend-svc + ConfigMap + Secret 都已建好）
# 用途：讓 /frontend 和 /config 都能透過 Ingress 存取

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /frontend
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
          - path: /config
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
