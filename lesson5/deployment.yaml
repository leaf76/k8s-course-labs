# ============================================
# 基本 Deployment — nginx 3 副本
# 用途：學習 Deployment 的基本結構
# 對照 Docker：docker compose up --scale web=3
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deploy
  labels:
    app: nginx
spec:
  replicas: 3                    # 副本數：維持 3 個 Pod
  selector:
    matchLabels:
      app: nginx                 # 用這個標籤找到對應的 Pod
  template:                      # Pod 的範本
    metadata:
      labels:
        app: nginx               # Pod 的標籤，要跟 selector 一致
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80  # 宣告容器監聽 80 port（文件用途）
