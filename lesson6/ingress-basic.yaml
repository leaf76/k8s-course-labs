# Lab 6-1: 基本 Ingress（Path-based Routing）
# 功能：根據 URL 路徑，將流量導向不同的 Service
#   /        → frontend-svc（前端）
#   /api     → api-svc（後端 API）
#
# 前置條件：
#   1. 已安裝 Ingress Controller（k3s 內建 Traefik，或用 nginx-ingress）
#   2. 已建立 frontend-svc 和 api-svc 兩個 ClusterIP Service
#
# Docker 對照：這就像 Nginx 反向代理的 location block
#   location / { proxy_pass http://frontend:80; }
#   location /api { proxy_pass http://api:3000; }

---
# --- 先建立測試用的 Deployment 和 Service ---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deploy
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP            # Ingress 後面接 ClusterIP 就夠了

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deploy
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: hashicorp/http-echo:latest
          args:
            - "-text=Hello from API"    # 回傳固定文字，方便驗證
            - "-listen=:3000"
          ports:
            - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: api-svc
spec:
  selector:
    app: api
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP

---
# --- Ingress 規則（重點在這裡）---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  annotations:
    # nginx-ingress 用這個；k3s Traefik 不需要
    # nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx       # k3s 改成 traefik
  rules:
    - http:
        paths:
          # 前端：所有 / 開頭的請求
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
          # API：所有 /api 開頭的請求
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-svc
                port:
                  number: 3000
