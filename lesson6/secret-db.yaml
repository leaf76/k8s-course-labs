# Lab 6-5: Secret（管理 MySQL 密碼）
# 功能：用 Secret 存放敏感資訊（密碼、API Key 等）
#
# Docker 對照：
#   docker run -e MYSQL_ROOT_PASSWORD=my-secret-pw mysql
#   ↓ K8s 等價 ↓
#   用 Secret 存密碼，再注入到 Pod
#
# ⚠️ 重要觀念：Secret 的 Base64 編碼「不是加密」！
#   echo -n "my-secret-pw" | base64    → bXktc2VjcmV0LXB3
#   echo "bXktc2VjcmV0LXB3" | base64 -d  → my-secret-pw
#   任何人拿到這個值都能解碼！Secret 只是「不讓你一眼看到明文」而已
#
# 最佳實踐：
#   1. 不要把 Secret YAML commit 到 Git
#   2. 生產環境用外部 Secret 管理（Vault、AWS Secrets Manager）
#   3. 用 kubectl create secret 指令建立，不寫 YAML

---
# --- 方法 1：YAML 宣告式（學習用，生產不建議）---

apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
type: Opaque                    # 通用類型（最常用）
data:
  # 值必須是 Base64 編碼
  # echo -n "rootpassword123" | base64
  MYSQL_ROOT_PASSWORD: cm9vdHBhc3N3b3JkMTIz
  # echo -n "appuser" | base64
  MYSQL_USER: YXBwdXNlcg==
  # echo -n "apppassword456" | base64
  MYSQL_PASSWORD: YXBwcGFzc3dvcmQ0NTY=
  # echo -n "myappdb" | base64
  MYSQL_DATABASE: bXlhcHBkYg==

# --- 方法 2（推薦）：用 stringData 直接寫明文，K8s 自動幫你編碼 ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: mysql-secret
# type: Opaque
# stringData:
#   MYSQL_ROOT_PASSWORD: "rootpassword123"
#   MYSQL_USER: "appuser"
#   MYSQL_PASSWORD: "apppassword456"
#   MYSQL_DATABASE: "myappdb"

---
# --- 用 Secret 的 MySQL Deployment ---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deploy
spec:
  replicas: 1                    # 資料庫通常只跑 1 個（後面會教 StatefulSet）
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          # 從 Secret 注入環境變數
          envFrom:
            - secretRef:
                name: mysql-secret   # 把 Secret 的所有 key 注入為環境變數
          # 也可以逐一注入（跟 ConfigMap 寫法一樣）：
          # env:
          #   - name: MYSQL_ROOT_PASSWORD
          #     valueFrom:
          #       secretKeyRef:
          #         name: mysql-secret
          #         key: MYSQL_ROOT_PASSWORD

---
apiVersion: v1
kind: Service
metadata:
  name: mysql-svc
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP                # 資料庫不需要對外，ClusterIP 就好
