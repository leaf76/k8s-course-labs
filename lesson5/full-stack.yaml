# ============================================
# 完整練習：API + 前端 + Service
# 用途：模擬真實部署場景
# 包含：Namespace、兩個 Deployment、三個 Service
# ============================================

# --- 1. Namespace ---
---
apiVersion: v1
kind: Namespace
metadata:
  name: fullstack-demo
  labels:
    project: fullstack

# --- 2. API Deployment（用 httpd 模擬 API）---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deploy
  namespace: fullstack-demo
  labels:
    app: api
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        tier: backend
    spec:
      containers:
        - name: api
          image: httpd:2.4
          ports:
            - containerPort: 80

# --- 3. 前端 Deployment（nginx）---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deploy
  namespace: fullstack-demo
  labels:
    app: frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: nginx:1.27
          ports:
            - containerPort: 80

# --- 4. API Service（ClusterIP — 只有內部能連）---
---
apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: fullstack-demo
  labels:
    app: api
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 80

# --- 5. 前端 Service（NodePort — 外部可連）---
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: fullstack-demo
  labels:
    app: frontend
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
