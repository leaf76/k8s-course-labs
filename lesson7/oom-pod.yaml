# oom-pod.yaml
# 故意觸發 OOMKilled — stress 工具嘗試吃 256MB，但 limits 只給 128Mi
# 第七堂 Lab 7-6：OOMKilled 示範用
apiVersion: v1
kind: Pod
metadata:
  name: oom-demo
spec:
  containers:
    - name: stress
      image: polinux/stress
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "256M", "--vm-hang", "1"]
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
