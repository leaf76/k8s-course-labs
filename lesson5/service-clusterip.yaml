# ============================================
# ClusterIP Service — 叢集內部存取
# 用途：為 nginx Deployment 建立穩定的內部入口
# 對照 Docker：docker network 內的容器用名稱互連
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
  labels:
    app: nginx
spec:
  type: ClusterIP               # 預設類型，可省略
  selector:
    app: nginx                   # 選擇 label 為 app=nginx 的 Pod
  ports:
    - port: 80                   # Service 監聽的 port
      targetPort: 80             # 轉發到 Pod 的 port
      protocol: TCP
